server:
  port: 8083

spring:
  application:
    name: DOCUMENT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/documentdb
    username: root
    password: ${DB_PASSWORD:273031}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

file:
  upload-dir: uploads/

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

application:
  security:
    jwt:
      secret: ${JWT_SECRET:ThisIsADevelopmentOnlyJwtSecretKeyForFinFlowAuthService123456789}
springdoc:
  api-docs:
    path: /documents/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
