server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: CONFIG-SERVER
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/vishnu-kanth/FinFlow_Config_Server}
          default-label: ${CONFIG_REPO_LABEL:main}
          clone-on-start: true
          force-pull: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always
